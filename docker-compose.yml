services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://nsi:nsi@postgres:5432/nsi_db
      REDIS_URL: redis://redis:6379/0
      API_KEY_HASH: ${API_KEY_HASH:-changeme}
      PYTHONPATH: /app/src
    volumes:
      - ./src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/api/v1/health/live').raise_for_status()"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: celery -A nsi_normalizer.workers.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql+psycopg://nsi:nsi@postgres:5432/nsi_db
      REDIS_URL: redis://redis:6379/0
      PYTHONPATH: /app/src
    volumes:
      - ./src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: celery -A nsi_normalizer.workers.celery_app beat --loglevel=info
    environment:
      DATABASE_URL: postgresql+psycopg://nsi:nsi@postgres:5432/nsi_db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis

  flower:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: celery -A nsi_normalizer.workers.celery_app flower --port=5555
    ports:
      - "5555:5555"
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: nsi
      POSTGRES_PASSWORD: nsi
      POSTGRES_DB: nsi_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nsi -d nsi_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
